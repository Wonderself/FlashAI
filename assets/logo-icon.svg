<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ff006e"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="40%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ff006e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bolt-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="saturate" values="2" result="sat"/>
      <feMerge><feMergeNode in="sat"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer circle ring -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="url(#ring-grad)" stroke-width="4" filter="url(#glow)" opacity="0.9"/>
  <!-- Inner circle subtle -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="url(#ring-grad)" stroke-width="1" opacity="0.3"/>
  <!-- Arc accent top-right -->
  <path d="M 95 30 A 52 52 0 0 1 100 50" fill="none" stroke="#00f0ff" stroke-width="3" stroke-linecap="round" opacity="0.6" filter="url(#glow)"/>
  <!-- Lightning bolt - main shape -->
  <path d="M 65 18 L 45 58 L 58 58 L 42 102 L 82 52 L 66 52 Z" fill="url(#bolt-grad)" filter="url(#bolt-glow)"/>
  <!-- Bolt highlight -->
  <path d="M 63 24 L 49 54 L 60 54 L 48 92 L 76 56 L 64 56 Z" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.8"/>
  <!-- Inner shine on bolt -->
  <path d="M 62 30 L 52 54 L 60 54 L 52 82 L 72 56 L 63 56 Z" fill="rgba(255,255,255,0.12)"/>
</svg>
