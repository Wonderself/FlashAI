<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page introuvable | FlashAI</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #020617;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .bg-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }
        .bg-glow-1 { top: -100px; left: -100px; background: #6366f1; }
        .bg-glow-2 { bottom: -100px; right: -100px; background: #bf00ff; }
        .container {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 3rem;
        }
        .logo img { width: 48px; height: 48px; animation: logo-pulse 3s ease-in-out infinite; }
        @keyframes logo-pulse {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(99,102,241,0.4)); }
            50% { filter: drop-shadow(0 0 20px rgba(191,0,255,0.6)); }
        }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-ai {
            background: linear-gradient(135deg, #ff00ff, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .code-404 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #6366f1 0%, #bf00ff 40%, #ff006e 70%, #00f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: gradient-shift 4s ease infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }
        p {
            color: #94a3b8;
            font-size: 1rem;
            max-width: 400px;
            margin: 0 auto 2rem;
            line-height: 1.6;
        }
        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.75rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #bf00ff);
            color: white;
            border: none;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.4); }
        .btn-outline {
            background: transparent;
            color: #a5b4fc;
            border: 1px solid rgba(99,102,241,0.3);
        }
        .btn-outline:hover { border-color: rgba(99,102,241,0.6); background: rgba(99,102,241,0.05); }
        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <canvas id="particles"></canvas>
    <div class="container">
        <div class="logo">
            <img src="assets/logo-icon.svg" alt="FlashAI">
            <span class="logo-text">Flash<span class="logo-ai">AI</span></span>
        </div>
        <div class="code-404">404</div>
        <h1>Page introuvable</h1>
        <p>Cette page n'existe pas ou a été déplacée. Pas de panique, notre équipe est toujours là pour vous aider.</p>
        <div class="actions">
            <a href="index.html" class="btn btn-primary">Retour à l'accueil</a>
            <a href="index.html#contact" class="btn btn-outline">Nous contacter</a>
        </div>
    </div>
    <script>
    (function() {
        var c = document.getElementById('particles');
        if (!c) return;
        var ctx = c.getContext('2d');
        c.width = window.innerWidth;
        c.height = window.innerHeight;
        window.addEventListener('resize', function() { c.width = window.innerWidth; c.height = window.innerHeight; });
        var colors = ['#6366f1','#bf00ff','#00f0ff','#ff006e','#ffd700'];
        var dots = Array.from({length: 60}, function() {
            return { x: Math.random() * c.width, y: Math.random() * c.height, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5, r: Math.random()*2+0.5, color: colors[Math.floor(Math.random()*colors.length)], a: Math.random()*0.4+0.1 };
        });
        function draw() {
            ctx.clearRect(0, 0, c.width, c.height);
            dots.forEach(function(d) {
                d.x += d.vx; d.y += d.vy;
                if (d.x < 0 || d.x > c.width) d.vx *= -1;
                if (d.y < 0 || d.y > c.height) d.vy *= -1;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
                ctx.fillStyle = d.color;
                ctx.globalAlpha = d.a;
                ctx.fill();
                ctx.globalAlpha = 1;
            });
            for (var i = 0; i < dots.length; i++) {
                for (var j = i+1; j < dots.length; j++) {
                    var dx = dots[i].x - dots[j].x, dy = dots[i].y - dots[j].y;
                    var dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(dots[i].x, dots[i].y);
                        ctx.lineTo(dots[j].x, dots[j].y);
                        ctx.strokeStyle = 'rgba(99,102,241,' + (0.08*(1-dist/100)) + ')';
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    })();
    </script>
</body>
</html>
